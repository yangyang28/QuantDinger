# Development override: keep the Nginx frontend container out of the default
# `docker compose up` set so you can run the Vite dev server on :8000 instead.
#
# Used by scripts/dev-frontend.sh (not loaded in production .env).
# Production uses COMPOSE_FILE=docker-compose.yml:docker-compose.build.yml only.
#
# Manual usage — backend stack only:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml -f docker-compose.dev.yml up -d
#
# Full stack with locally-built frontend on :8888 (production .env):
#   docker compose up -d --build

services:
  frontend:
    profiles: ["with-frontend-image"]
